<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Sunset branding gradient for favicon background -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB84D"/>
      <stop offset="0.4" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#FF1A53"/>
    </linearGradient>
    
    <!-- Fine specular shine overlay -->
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(26 20) rotate(35) scale(58 42)">
      <stop stop-color="#FFF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Unified space-gray metallic gradient for structure -->
    <linearGradient id="legMetal" x1="50" y1="52" x2="50" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0" />
      <stop offset="0.5" stop-color="#64748B" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>

    <!-- Polished metal ball feet gradient -->
    <radialGradient id="footMetal" cx="30%" cy="30%" r="70%">
      <stop offset="0" stop-color="#94A3B8" />
      <stop offset="0.8" stop-color="#334155" />
      <stop offset="1" stop-color="#0F172A" />
    </radialGradient>

    <!-- Glowing gold-orange-pink ring gradient -->
    <linearGradient id="ringGrad" x1="36" y1="14" x2="64" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE566"/>
      <stop offset="0.5" stop-color="#FF5500"/>
      <stop offset="1" stop-color="#FF2255"/>
    </linearGradient>

    <!-- Lens fill -->
    <radialGradient id="ringFillGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(50 28) rotate(90) scale(15)">
      <stop offset="0" stop-color="#1E1B4B" />
      <stop offset="0.8" stop-color="#0B0926" />
      <stop offset="1" stop-color="#FF5500" stop-opacity="0.15" />
    </radialGradient>

    <!-- Iris blades gradients -->
    <linearGradient id="bladeA" x1="50" y1="18" x2="50" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8DC"/>
      <stop offset="1" stop-color="#FFB020"/>
    </linearGradient>
    <linearGradient id="bladeB" x1="50" y1="18" x2="50" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE0C2"/>
      <stop offset="1" stop-color="#FF5500"/>
    </linearGradient>
    <linearGradient id="bladeC" x1="50" y1="18" x2="50" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD6E8"/>
      <stop offset="1" stop-color="#FF6688"/>
    </linearGradient>
  </defs>

  <!-- Premium rounded card base -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <rect width="100" height="100" rx="24" fill="url(#shine)"/>

  <!-- Sleek metallic legs -->
  <path d="M50 54 L22 82" stroke="url(#legMetal)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M50 54 L78 82" stroke="url(#legMetal)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M50 54 L50 86" stroke="url(#legMetal)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sharp leg highlights -->
  <path d="M50 56 L24 81" stroke="#FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <path d="M50 56 L76 81" stroke="#FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <path d="M50 56 L50 82" stroke="#FFF" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>

  <!-- Polished ball feet -->
  <circle cx="22" cy="82" r="4.5" fill="url(#footMetal)"/>
  <circle cx="78" cy="82" r="4.5" fill="url(#footMetal)"/>
  <circle cx="50" cy="86" r="4" fill="url(#footMetal)"/>
  <circle cx="22" cy="82" r="1" fill="#FFF" opacity="0.4"/>
  <circle cx="78" cy="82" r="1" fill="#FFF" opacity="0.4"/>
  <circle cx="50" cy="86" r="0.8" fill="#FFF" opacity="0.4"/>

  <!-- Hub -->
  <circle cx="50" cy="51" r="4" fill="url(#legMetal)"/>
  <circle cx="50" cy="51" r="1.5" fill="#FFF" opacity="0.3"/>

  <!-- Stem -->
  <rect x="47" y="40" width="6" height="11" rx="1.5" fill="url(#legMetal)"/>
  <rect x="49" y="41.5" width="1" height="8" rx="0.5" fill="#FFF" opacity="0.25"/>

  <!-- Glass lens & aperture ring -->
  <circle cx="50" cy="28" r="14.5" stroke="url(#ringGrad)" stroke-width="2.5" fill="url(#ringFillGrad)"/>

  <!-- 3 iris blades -->
  <g transform="translate(50 28)">
    <path d="M0 -10 C3.5 -9 6 -6 5.5 -2 L0 2.5 L-5.5 -2 C-6 -6 -3.5 -9 0 -10 Z" fill="url(#bladeA)"/>
    <path d="M0 -10 C3.5 -9 6 -6 5.5 -2 L0 2.5 L-5.5 -2 C-6 -6 -3.5 -9 0 -10 Z" fill="url(#bladeB)" transform="rotate(120)"/>
    <path d="M0 -10 C3.5 -9 6 -6 5.5 -2 L0 2.5 L-5.5 -2 C-6 -6 -3.5 -9 0 -10 Z" fill="url(#bladeC)" transform="rotate(240)"/>
  </g>
  
  <ellipse cx="46" cy="24" rx="4" ry="2.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="52.5" cy="30" r="1" fill="#FFFFFF" opacity="0.6"/>
</svg>
