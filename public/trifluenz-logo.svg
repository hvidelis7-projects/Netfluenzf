<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Unified sleek space-gray metallic gradient for structure -->
    <linearGradient id="tf-metal" x1="0" y1="120" x2="256" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E293B" />
      <stop offset="0.5" stop-color="#475569" />
      <stop offset="1" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Polished metal ball feet gradient -->
    <radialGradient id="tf-foot" cx="35%" cy="35%" r="65%">
      <stop offset="0" stop-color="#64748B" />
      <stop offset="0.75" stop-color="#1E293B" />
      <stop offset="1" stop-color="#0F172A" />
    </radialGradient>

    <!-- Premium glowing jewel gradient for the aperture ring -->
    <linearGradient id="tf-ring" x1="94" y1="24" x2="162" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD000" />
      <stop offset="0.5" stop-color="#FF5500" />
      <stop offset="1" stop-color="#FF0055" />
    </linearGradient>

    <radialGradient
      id="tf-ringFill"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(128 54) rotate(90) scale(36)"
    >
      <stop offset="0" stop-color="#1E1B4B" />
      <stop offset="0.75" stop-color="#0B0926" />
      <stop offset="1" stop-color="#FF5500" stop-opacity="0.2" />
    </radialGradient>

    <!-- Cohesive, warm iris blades -->
    <linearGradient id="tf-bladeA" x1="128" y1="28" x2="128" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3B0" />
      <stop offset="0.5" stop-color="#FFB020" />
      <stop offset="1" stop-color="#FF7700" />
    </linearGradient>
    <linearGradient id="tf-bladeB" x1="128" y1="28" x2="128" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD4A8" />
      <stop offset="0.45" stop-color="#FF5500" />
      <stop offset="1" stop-color="#FF2200" />
    </linearGradient>
    <linearGradient id="tf-bladeC" x1="128" y1="28" x2="128" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFCCE8" />
      <stop offset="0.45" stop-color="#FF6688" />
      <stop offset="1" stop-color="#FF4400" />
    </linearGradient>

    <radialGradient
      id="tf-iris"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(128 54) rotate(90) scale(14)"
    >
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.35" stop-color="#FFE8A3" />
      <stop offset="0.75" stop-color="#FF8833" />
      <stop offset="1" stop-color="#FF3300" />
    </radialGradient>

    <filter id="tf-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF8833" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FF4400" flood-opacity="0.22" />
    </filter>
    <filter id="tf-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient background glow wash behind the glass lens -->
  <ellipse cx="128" cy="130" rx="88" ry="96" fill="#FF5500" opacity="0.04" />
  <ellipse cx="128" cy="54" rx="42" ry="38" fill="#FF8833" opacity="0.08" />

  <!-- Ambient drop shadow under the main logo -->
  <g filter="url(#tf-glow)">
    <!-- Sleek metallic tripod legs -->
    <path
      d="M128 124 Q96 160 40 208"
      stroke="url(#tf-metal)"
      stroke-width="11"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M128 124 Q160 160 216 208"
      stroke="url(#tf-metal)"
      stroke-width="11"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M128 124 L128 222"
      stroke="url(#tf-metal)"
      stroke-width="9"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Sharp highlights along the metallic legs -->
    <path
      d="M128 130 Q100 164 50 204"
      stroke="#FFFFFF"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.22"
    />
    <path
      d="M128 130 Q156 164 206 204"
      stroke="#FFFFFF"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.22"
    />
    <path
      d="M128 134 L128 214"
      stroke="#FFFFFF"
      stroke-width="1.8"
      stroke-linecap="round"
      fill="none"
      opacity="0.18"
    />

    <!-- Sleek metallic ball feet -->
    <circle cx="40" cy="208" r="7" fill="url(#tf-foot)" />
    <circle cx="216" cy="208" r="7" fill="url(#tf-foot)" />
    <circle cx="128" cy="222" r="6.5" fill="url(#tf-foot)" />
    <circle cx="40" cy="208" r="2" fill="#FFFFFF" opacity="0.3" />
    <circle cx="216" cy="208" r="2" fill="#FFFFFF" opacity="0.3" />
    <circle cx="128" cy="222" r="1.8" fill="#FFFFFF" opacity="0.3" />

    <!-- Sleek Y-junction hub -->
    <circle cx="128" cy="116" r="8" fill="url(#tf-metal)" stroke="#475569" stroke-width="1" />
    <circle cx="128" cy="116" r="3" fill="#FFFFFF" opacity="0.2" />

    <!-- Sleek metallic stem -->
    <rect x="120" y="86" width="16" height="26" rx="3" fill="url(#tf-metal)" />
    <rect x="123" y="88" width="2" height="22" rx="1" fill="#FFFFFF" opacity="0.15" />

    <!-- Glowing aperture ring -->
    <circle cx="128" cy="54" r="34" stroke="url(#tf-ring)" stroke-width="5.5" fill="url(#tf-ringFill)" />

    <!-- 3 aperture blades -->
    <g transform="translate(128 54)">
      <path
        d="M0 -26 C9 -24 16 -16 14 -5 L0 6 L-14 -5 C-16 -16 -9 -24 0 -26 Z"
        fill="url(#tf-bladeA)"
      />
      <path
        d="M0 -26 C9 -24 16 -16 14 -5 L0 6 L-14 -5 C-16 -16 -9 -24 0 -26 Z"
        fill="url(#tf-bladeB)"
        transform="rotate(120)"
      />
      <path
        d="M0 -26 C9 -24 16 -16 14 -5 L0 6 L-14 -5 C-16 -16 -9 -24 0 -26 Z"
        fill="url(#tf-bladeC)"
        transform="rotate(240)"
      />
    </g>

    <!-- Inner lens core with bloom -->
    <g filter="url(#tf-bloom)">
      <circle cx="128" cy="54" r="11" fill="url(#tf-iris)" />
    </g>
    <ellipse cx="121" cy="47" rx="9" ry="6" fill="#FFFFFF" opacity="0.4" />
    <circle cx="133" cy="58" r="2.5" fill="#FFFFFF" opacity="0.55" />
  </g>
</svg>
